{% extends "plataforma/base.html" %}
{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-7 col-lg-6">
        <div class="card shadow border-0 rounded-4 p-4">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Registro de Técnico</h2>
                <p class="text-muted">Unite a la red profesional de repuestos</p>
            </div>
            <form method="post">
                {% csrf_token %}
                <div class="row">
                    {% for field in form %}
                    <div class="{% if field.name == 'password1' or field.name == 'password2' %}col-md-6{% else %}col-12{% endif %} mb-3">
                        <label class="form-label fw-bold small text-secondary">{{ field.label }}</label>
                        <div class="input-group">
                            <input type="{{ field.field.widget.input_type }}" 
                                   name="{{ field.name }}" 
                                   class="form-control rounded-pill border-2 {% if field.errors %}is-invalid{% endif %}" 
                                   placeholder="{{ field.label }}">
                        </div>
                        {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors|first }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}
                </div>
                <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill shadow-sm mt-3 fw-bold">
                    CREAR CUENTA TÉCNICA
                </button>
            </form>
            <div class="text-center mt-4">
                <p class="small">¿Ya tenés cuenta? <a href="{% url 'login' %}" class="text-primary fw-bold text-decoration-none">Ingresá acá</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
