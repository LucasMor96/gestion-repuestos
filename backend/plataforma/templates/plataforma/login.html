{% extends "plataforma/base.html" %}
{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5">
        <div class="card shadow border-0 rounded-4 p-4">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Ingresá a tu cuenta</h2>
                <p class="text-muted">Gestión de Repuestos y Crédito</p>
            </div>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold small">{{ field.label }}</label>
                        <input type="{{ field.field.widget.input_type }}" 
                               name="{{ field.name }}" 
                               class="form-control rounded-pill border-2" 
                               placeholder="{{ field.label }}">
                        {% if field.errors %}
                            <div class="text-danger small mt-1">{{ field.errors|first }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill shadow-sm mt-3">
                    INGRESAR
                </button>
            </form>
            <div class="text-center mt-4">
                <p class="small">¿No tenés cuenta? <a href="{% url 'registro_tipo' %}" class="text-primary fw-bold text-decoration-none">Registrate acá</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
