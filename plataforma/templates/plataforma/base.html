<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión de Repuestos{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bs-primary: #FF8C00; /* Tu Naranja */
            --bs-primary-rgb: 255, 140, 0;
            --green-pastel: #F0FFF4;
        }
        .btn-primary { background-color: var(--bs-primary); border-color: var(--bs-primary); font-weight: bold; }
        .btn-primary:hover { background-color: #e67e00; border-color: #e67e00; }
        .bg-pastel-green { background-color: var(--green-pastel); }
        .navbar-brand b { color: var(--bs-primary); }
        .nav-link:hover { color: var(--bs-primary) !important; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-white bg-white border-bottom shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand text-dark tracking-tighter" href="{% url 'inicio' %}">
                <b>RE</b>PUESTOS
            </a>
            <div class="ms-auto">
                {% if user.is_authenticated %}
                    <span class="me-3 text-muted small">Hola, {{ user.first_name }}</span>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-dark btn-sm rounded-pill px-3">Mi Panel</a>
                    <a href="{% url 'logout' %}" class="btn btn-link text-muted btn-sm text-decoration-none">Salir</a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-outline-primary btn-sm rounded-pill px-4 me-2">Ingresar</a>
                    <a href="{% url 'registro_tipo' %}" class="btn btn-primary btn-sm rounded-pill px-4">Registrarse</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <footer class="container text-center py-5 text-muted small">
        <hr>
        &copy; 2026 Gestión de Repuestos — Lucas Moraga & Maxi
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
