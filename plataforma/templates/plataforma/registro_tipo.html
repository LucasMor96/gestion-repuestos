{% extends "plataforma/base.html" %}
{% block content %}
<div class="text-center py-5">
    <h2 class="fw-bold mb-5">Seleccioná tu perfil</h2>
    <div class="row justify-content-center gap-4">
        <div class="col-md-4">
            <div class="card shadow-sm border-0 rounded-4 p-5 h-100 bg-white">
                <div class="display-4 mb-3">🛠️</div>
                <h4 class="fw-bold">Técnico</h4>
                <p class="text-muted small">Para gestionar tus pedidos y acceder a crédito con proveedores.</p>
                <a href="{% url 'registro_tecnico' %}" class="btn btn-outline-primary w-100 rounded-pill fw-bold">Soy Técnico</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm border-0 rounded-4 p-5 h-100 bg-white">
                <div class="display-4 mb-3">🏪</div>
                <h4 class="fw-bold">Proveedor</h4>
                <p class="text-muted small">Para publicar tus productos y asignar créditos a técnicos.</p>
                <a href="{% url 'registro_proveedor' %}" class="btn btn-primary w-100 rounded-pill fw-bold text-white">Soy Proveedor</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
